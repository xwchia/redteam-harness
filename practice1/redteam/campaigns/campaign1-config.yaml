# Campaign 1: Single-Turn Technique Sweep
# PyRIT PromptSendingOrchestrator via pyrit_adapter.py --mode single_turn
#
# Goal: Broad surface coverage across all 3 categories in a single pass.
#       Each behavior is attacked with 6 obfuscation/framing techniques.
#       Reasoning channel is captured on every attempt via the custom client.
#
# Expected attempts: 12 behaviors x 6 techniques x 1 pass = 72 requests
# Run command:
#   conda run --no-capture-output -n redteam \
#     python ~/.cursor/skills/redteam-campaign/scripts/toolkits/pyrit_adapter.py \
#     --mode single_turn \
#     --behaviors redteam/behaviors.jsonl \
#     --categories harmful_content,prompt_injection,pii_leakage \
#     --techniques base64_obfuscation,reasoning_probe,hypothetical_scenario,authority_appeal,instruction_priority,decomposition \
#     --budget 1 \
#     --client redteam.client:send \
#     --out redteam/campaigns \
#     --run-id campaign1-single-turn

model: gpt-oss-120b

categories:
  - harmful_content
  - prompt_injection
  - pii_leakage

techniques:
  - base64_obfuscation      # Priority 1: confirmed base64 decoder active
  - reasoning_probe         # Priority 2: targets reasoning_content channel for cross-leak
  - hypothetical_scenario   # Priority 3: fictional framing with no system prompt anchor
  - authority_appeal        # Priority 4: claims professional/researcher justification
  - instruction_priority    # Priority 5: SYSTEM OVERRIDE in user turn; no system prompt = elevated risk
  - decomposition           # Priority 6: splits objective into innocent-looking sub-tasks

# Single attempt per behavior+technique (no iterative refinement in Campaign 1)
budget: 1

# Stay within 250 req/min rate limit; 4 is safe with the 12-behavior dataset
concurrency: 4

# Custom client preserves reasoning_content from Azure response
client: redteam.client:send

# Built-in heuristic scorer — no judge LLM needed
# Monitors both content channel AND reasoning_content for cross-channel findings
evaluator: heuristic

max_tokens: 512
temperature: 0
